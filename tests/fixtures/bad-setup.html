<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Punter.js Bad Setup Fixture</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; }
    </style>
</head>
<body>
<canvas id="game" width="375" height="667"></canvas>
<script src="/src/punter.js"></script>
<script>
    window.__setupDone = false;

    punter.on('ready', function () {
        window.__setupDone = true;
    });

    punter.setup({
        canvas: '#game',
        images: { missing: '/images/does-not-exist.png' }
    });
</script>
</body>
</html>
