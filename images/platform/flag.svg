<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 60" width="40" height="60">
  <defs>
    <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="40%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="50%" stop-color="#fdd835"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <filter id="flagShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- pole shadow -->
  <rect x="8" y="2" width="3" height="58" rx="1.5" fill="#3e2723" opacity="0.3"/>
  <!-- pole -->
  <rect x="4" y="0" width="5" height="60" rx="2.5" fill="url(#poleGrad)"/>
  <!-- pole highlight -->
  <rect x="4" y="0" width="2" height="60" rx="1" fill="#a1887f" opacity="0.4"/>
  <!-- flag with wave shape -->
  <path d="M9 4 C16 6 24 2 38 8 C36 12 30 14 38 18 C28 22 18 18 9 22 Z" fill="url(#flagGrad)" filter="url(#flagShadow)"/>
  <!-- flag inner detail -->
  <path d="M12 8 C18 9 24 6 32 10" stroke="#f57f17" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M12 14 C18 15 24 12 32 16" stroke="#f57f17" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- star on flag -->
  <path d="M22 11 L23.5 8.5 L25 11 L28 11.5 L25.5 13.5 L26.5 16 L23.5 14.5 L20.5 16 L21.5 13.5 L19 11.5 Z" fill="#fff" opacity="0.8"/>
  <!-- pole top ornament -->
  <circle cx="6.5" cy="3" r="4" fill="#fdd835"/>
  <circle cx="6.5" cy="3" r="2.5" fill="#ffee58"/>
  <circle cx="5.5" cy="2" r="1" fill="#fff" opacity="0.7"/>
</svg>
