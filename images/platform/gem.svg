<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gemFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="40%" stop-color="#fdd835"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </linearGradient>
    <linearGradient id="gemTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#ffee58"/>
    </linearGradient>
    <filter id="gemGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- outer glow -->
  <polygon points="16,1 30,12 26,30 6,30 2,12" fill="#fdd835" opacity="0.3" filter="url(#gemGlow)"/>
  <!-- main body -->
  <polygon points="16,1 30,12 26,30 6,30 2,12" fill="url(#gemFace)"/>
  <!-- top facet -->
  <polygon points="16,1 30,12 16,10 2,12" fill="url(#gemTop)"/>
  <!-- center facet -->
  <polygon points="16,10 30,12 26,30 6,30 2,12" fill="#f9a825"/>
  <!-- inner highlight -->
  <polygon points="16,10 22,13 19,24 13,24 10,13" fill="#fff9c4" opacity="0.45"/>
  <!-- edge highlights -->
  <path d="M16 1 L2 12" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
  <path d="M16 1 L30 12" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- sparkles -->
  <circle cx="9" cy="6" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="24" cy="8" r="1.2" fill="#fff" opacity="0.7"/>
  <circle cx="7" cy="20" r="1" fill="#fff" opacity="0.5"/>
  <!-- star sparkle -->
  <path d="M22 4 L23 2 L24 4 L26 5 L24 6 L23 8 L22 6 L20 5 Z" fill="#fff" opacity="0.8"/>
</svg>
