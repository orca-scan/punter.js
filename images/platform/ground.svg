<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <defs>
    <linearGradient id="dirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="40%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="50%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <!-- dirt body -->
  <rect x="0" y="12" width="200" height="28" fill="url(#dirtGrad)"/>
  <!-- dirt texture spots -->
  <circle cx="30" cy="26" r="4" fill="#5d4037" opacity="0.4"/>
  <circle cx="90" cy="30" r="5" fill="#5d4037" opacity="0.3"/>
  <circle cx="150" cy="24" r="3.5" fill="#5d4037" opacity="0.35"/>
  <circle cx="170" cy="34" r="4" fill="#4e342e" opacity="0.3"/>
  <!-- pebbles -->
  <ellipse cx="50" cy="32" rx="3" ry="2" fill="#9e9e9e" opacity="0.4"/>
  <ellipse cx="130" cy="28" rx="2.5" ry="1.5" fill="#9e9e9e" opacity="0.35"/>
  <ellipse cx="180" cy="35" rx="2" ry="1.5" fill="#9e9e9e" opacity="0.3"/>
  <!-- grass top layer -->
  <rect x="0" y="0" width="200" height="14" fill="url(#grassGrad)"/>
  <!-- grass blade details -->
  <path d="M10 12 Q12 4 14 12" fill="#66bb6a"/>
  <path d="M30 12 Q33 2 36 12" fill="#81c784"/>
  <path d="M55 12 Q57 5 59 12" fill="#66bb6a"/>
  <path d="M75 12 Q78 3 81 12" fill="#81c784"/>
  <path d="M100 12 Q102 5 104 12" fill="#66bb6a"/>
  <path d="M120 12 Q123 2 126 12" fill="#81c784"/>
  <path d="M145 12 Q147 4 149 12" fill="#66bb6a"/>
  <path d="M165 12 Q168 3 171 12" fill="#81c784"/>
  <path d="M185 12 Q187 5 189 12" fill="#66bb6a"/>
  <!-- grass highlight -->
  <rect x="0" y="0" width="200" height="4" fill="#a5d6a7" opacity="0.4"/>
  <!-- tiny flowers -->
  <circle cx="22" cy="6" r="2" fill="#fff176" opacity="0.7"/>
  <circle cx="88" cy="5" r="1.8" fill="#f48fb1" opacity="0.6"/>
  <circle cx="155" cy="6" r="2" fill="#fff176" opacity="0.65"/>
</svg>
