<!doctype html>
<html>
  <head>
    <title>Asteroids</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #000010;
        overflow: hidden;
      }

      canvas {
        display: block;
      }
    </style>
    <script src="../src/punter.js"></script>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script>

      // =========================================================
      // COLORS
      // =========================================================
      var COLOR_SHIP     = '#00ffcc';
      var COLOR_THRUST   = '#ff6600';
      var COLOR_BULLET   = '#ffff44';
      var COLOR_ASTEROID = '#8899aa';
      var COLOR_AST_FILL = 'rgba(14,22,34,0.8)';
      var COLOR_TEXT     = '#ffffff';
      var COLOR_DIM      = '#445566';

      // =========================================================
      // SETTINGS
      // =========================================================
      var DPR = punter.dpr;

      var SHIP_SIZE         = 18 * DPR;
      var SHIP_TURN         = 0.065;        // radians per frame
      var SHIP_THRUST       = 0.18 * DPR;
      var SHIP_FRICTION     = 0.97;
      var BULLET_SPEED      = 11 * DPR;
      var BULLET_LIFE       = 55;           // frames before bullet expires
      var MAX_BULLETS       = 5;
      var SHOOT_COOLDOWN    = 11;           // frames between shots
      var INVINCIBLE_FRAMES = 180;          // frames of invincibility after death
      var AST_RADII         = [50 * DPR, 28 * DPR, 14 * DPR]; // large, medium, small
      var AST_BASE_SPEEDS   = [0.8 * DPR, 1.4 * DPR, 2.2 * DPR];
      var AST_SCORES        = [20, 50, 100];
      var INIT_ASTEROIDS    = 4;
      var STAR_COUNT        = 80;

      // =========================================================
      // STATE
      // =========================================================
      var ship, asteroids, bullets, stars;
      var score, lives, level, gameOver, invTimer, shootTimer;
      var particles, popups, levelAnnounce;
      var highScore = parseInt(localStorage.getItem('ast_hi'), 10) || 0;

      // =========================================================
      // SETUP
      // =========================================================
      punter.setup({
        canvas: '#game',
        sounds: {
          shoot:   '../sounds/cannon1.mp3',
          hitBig:  '../sounds/punch1.mp3',
          hitMed:  '../sounds/punch2.mp3',
          hitSml:  '../sounds/bling1.mp3',
          die:     '../sounds/error1.mp3',
          levelup: '../sounds/fanfare1.mp3',
          over:    '../sounds/error3.mp3'
        }
      });

      // =========================================================
      // SCENE: play
      // =========================================================
      punter.scene('play', function () {

        resetGame();

        punter.on('resize', function () {
          buildStars(punter.width, punter.height);
        });

        punter.on('update', function () {
          var w = punter.width;
          var h = punter.height;

          // ---- game over ----
          if (gameOver) {
            if (punter.keys[' '] || punter.pointer.clicked) {
              punter.clearInput();
              resetGame();
            }
            return;
          }

          // ---- rotate ----
          if (punter.keys['ArrowLeft']  || punter.keys['a']) ship.angle -= SHIP_TURN;
          if (punter.keys['ArrowRight'] || punter.keys['d']) ship.angle += SHIP_TURN;

          // ---- thrust ----
          ship.thrusting = !!(punter.keys['ArrowUp'] || punter.keys['w']);
          if (ship.thrusting) {
            ship.vx += Math.cos(ship.angle) * SHIP_THRUST;
            ship.vy += Math.sin(ship.angle) * SHIP_THRUST;
          }
          ship.vx *= SHIP_FRICTION;
          ship.vy *= SHIP_FRICTION;
          ship.x = wrap(ship.x + ship.vx, w);
          ship.y = wrap(ship.y + ship.vy, h);

          // ---- shoot ----
          if (shootTimer > 0) shootTimer--;
          if (shootTimer === 0 && (punter.keys[' '] || punter.pointer.clicked) && bullets.length < MAX_BULLETS) {
            fireBullet();
            punter.clearInput();
          }

          // ---- move bullets ----
          for (var i = bullets.length - 1; i >= 0; i--) {
            bullets[i].x = wrap(bullets[i].x + bullets[i].vx, w);
            bullets[i].y = wrap(bullets[i].y + bullets[i].vy, h);
            if (--bullets[i].life <= 0) bullets.splice(i, 1);
          }

          // ---- move asteroids ----
          for (var i = 0; i < asteroids.length; i++) {
            asteroids[i].x = wrap(asteroids[i].x + asteroids[i].vx, w);
            asteroids[i].y = wrap(asteroids[i].y + asteroids[i].vy, h);
            asteroids[i].spin += asteroids[i].spinSpeed;
          }

          // ---- bullet vs asteroid ----
          for (var bi = bullets.length - 1; bi >= 0; bi--) {
            for (var ai = asteroids.length - 1; ai >= 0; ai--) {
              var hr = asteroids[ai].radius + 3 * DPR;
              if (dist2(bullets[bi].x, bullets[bi].y, asteroids[ai].x, asteroids[ai].y) < hr * hr) {
                var hit = asteroids.splice(ai, 1)[0];
                bullets.splice(bi, 1);
                score += AST_SCORES[hit.size];
                spawnFragments(hit);
                punter.playSound(hit.size === 0 ? 'hitBig' : hit.size === 1 ? 'hitMed' : 'hitSml');
                spawnDebris(hit.x, hit.y, hit.size);
                addPopup(hit.x, hit.y, '+' + AST_SCORES[hit.size]);
                break;
              }
            }
          }

          // ---- ship vs asteroid ----
          if (invTimer > 0) {
            invTimer--;
          } else {
            for (var ai = 0; ai < asteroids.length; ai++) {
              var cr = asteroids[ai].radius * 0.85 + SHIP_SIZE * 0.45;
              if (dist2(ship.x, ship.y, asteroids[ai].x, asteroids[ai].y) < cr * cr) {
                lives--;
                invTimer = INVINCIBLE_FRAMES;
                ship.vx  = 0;
                ship.vy  = 0;
                ship.x   = w / 2;
                ship.y   = h / 2;
                punter.playSound('die');
                if (lives <= 0) {
                  gameOver = true;
                  if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('ast_hi', String(highScore));
                  }
                  punter.playSound('over');
                }
                break;
              }
            }
          }

          // ---- next level ----
          if (asteroids.length === 0) {
            level++;
            punter.playSound('levelup');
            spawnAsteroids(w, h, INIT_ASTEROIDS + level - 1);
            levelAnnounce = 120;
          }

          // ---- update particles ----
          for (var pi = particles.length - 1; pi >= 0; pi--) {
            particles[pi].x = wrap(particles[pi].x + particles[pi].vx, w);
            particles[pi].y = wrap(particles[pi].y + particles[pi].vy, h);
            if (--particles[pi].life <= 0) particles.splice(pi, 1);
          }

          // ---- update popups ----
          for (var po = popups.length - 1; po >= 0; po--) {
            popups[po].y -= 0.6 * DPR;
            if (--popups[po].life <= 0) popups.splice(po, 1);
          }

          if (levelAnnounce > 0) levelAnnounce--;
        });

        punter.on('draw', function () {
          var ctx = this;
          var w   = punter.width;
          var h   = punter.height;

          drawStars(ctx);

          for (var i = 0; i < asteroids.length; i++) drawAsteroid(ctx, asteroids[i]);
          drawParticles(ctx);
          for (var i = 0; i < bullets.length; i++)   drawBullet(ctx, bullets[i]);

          // blink ship during invincibility
          if (invTimer <= 0 || Math.floor(invTimer / 8) % 2 === 0) drawShip(ctx);

          drawHUD(ctx, w, h);
          drawPopups(ctx);
          if (levelAnnounce > 0) drawLevelAnnounce(ctx, w, h);
          if (gameOver) drawGameOver(ctx, w, h);
        });
      });

      // =========================================================
      // GAME ACTIONS
      // =========================================================

      /**
       * Fires a bullet from the ship nose in the facing direction
       */
      function fireBullet() {
        bullets.push({
          x:    ship.x + Math.cos(ship.angle) * SHIP_SIZE,
          y:    ship.y + Math.sin(ship.angle) * SHIP_SIZE,
          vx:   Math.cos(ship.angle) * BULLET_SPEED + ship.vx * 0.5,
          vy:   Math.sin(ship.angle) * BULLET_SPEED + ship.vy * 0.5,
          life: BULLET_LIFE
        });
        shootTimer = SHOOT_COOLDOWN;
        punter.playSound('shoot');
      }

      /**
       * Breaks an asteroid into two smaller pieces deflected in opposite directions
       */
      function spawnFragments(ast) {
        if (ast.size >= 2) return;
        var nextSize = ast.size + 1;
        var baseDir  = Math.atan2(ast.vy, ast.vx);
        for (var i = 0; i < 2; i++) {
          var spread = (Math.PI / 4) * (i === 0 ? 1 : -1);
          var spd    = AST_BASE_SPEEDS[nextSize] * (0.7 + Math.random() * 0.6);
          var frag   = makeAsteroid(ast.x, ast.y, nextSize);
          frag.vx = Math.cos(baseDir + spread) * spd;
          frag.vy = Math.sin(baseDir + spread) * spd;
          asteroids.push(frag);
        }
      }

      /**
       * Spawns debris particles when an asteroid is destroyed
       */
      function spawnDebris(x, y, size) {
        var count = 6 + (2 - size) * 3;
        for (var i = 0; i < count; i++) {
          var angle = Math.random() * Math.PI * 2;
          var speed = (0.8 + Math.random() * 2.5) * DPR;
          particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 20 + Math.floor(Math.random() * 20),
            maxLife: 40
          });
        }
      }

      /**
       * Adds a floating score popup at the given position
       */
      function addPopup(x, y, text) {
        popups.push({ x: x, y: y, text: text, life: 40, maxLife: 40 });
      }

      // =========================================================
      // SPAWN / RESET
      // =========================================================

      /**
       * Spawns count large asteroids away from the canvas centre
       */
      function spawnAsteroids(w, h, count) {
        for (var i = 0; i < count; i++) {
          var x, y;
          do {
            x = Math.random() * w;
            y = Math.random() * h;
          } while (dist2(x, y, w / 2, h / 2) < sqr(120 * DPR));
          asteroids.push(makeAsteroid(x, y, 0));
        }
      }

      /**
       * Creates an asteroid with a random jagged polygon shape
       */
      function makeAsteroid(x, y, size) {
        var r      = AST_RADII[size];
        var numPts = 9 + Math.floor(Math.random() * 4);
        var pts    = [];
        for (var i = 0; i < numPts; i++) {
          var a   = (i / numPts) * Math.PI * 2;
          var jag = r * (0.65 + Math.random() * 0.5);
          pts.push({ x: Math.cos(a) * jag, y: Math.sin(a) * jag });
        }
        var speed = AST_BASE_SPEEDS[size] * (0.5 + Math.random() * 0.6);
        var dir   = Math.random() * Math.PI * 2;
        return {
          x: x, y: y,
          vx: Math.cos(dir) * speed,
          vy: Math.sin(dir) * speed,
          radius: r, size: size,
          spin: 0, spinSpeed: (Math.random() - 0.5) * 0.04,
          pts: pts
        };
      }

      /**
       * Generates random star positions for the background
       */
      function buildStars(w, h) {
        stars = [];
        var seed = 54321;
        for (var i = 0; i < STAR_COUNT; i++) {
          seed = (seed * 1664525 + 1013904223) & 0x7fffffff;
          var sx = seed % w;
          seed = (seed * 1664525 + 1013904223) & 0x7fffffff;
          var sy = seed % h;
          seed = (seed * 1664525 + 1013904223) & 0x7fffffff;
          var alpha = 0.2 + (seed % 80) / 100;
          stars.push({ x: sx, y: sy, a: alpha });
        }
      }

      /**
       * Resets all game state for a new game
       */
      function resetGame() {
        var w = punter.width  || 375;
        var h = punter.height || 667;

        ship = {
          x: w / 2, y: h / 2,
          vx: 0, vy: 0,
          angle: -Math.PI / 2, // pointing up
          thrusting: false
        };
        asteroids  = [];
        bullets    = [];
        score      = 0;
        lives      = 3;
        level      = 1;
        gameOver   = false;
        invTimer   = 0;
        shootTimer     = 0;
        particles     = [];
        popups        = [];
        levelAnnounce = 0;

        buildStars(w, h);
        spawnAsteroids(w, h, INIT_ASTEROIDS);
      }

      // =========================================================
      // DRAW HELPERS
      // =========================================================

      function drawStars(ctx) {
        if (!stars) return;
        for (var i = 0; i < stars.length; i++) {
          ctx.fillStyle = 'rgba(255,255,255,' + stars[i].a + ')';
          ctx.fillRect(stars[i].x, stars[i].y, DPR, DPR);
        }
      }

      function drawShip(ctx) {
        ctx.save();
        ctx.translate(ship.x, ship.y);
        ctx.rotate(ship.angle + Math.PI / 2);
        ctx.strokeStyle = COLOR_SHIP;
        ctx.lineWidth   = 2 * DPR;
        ctx.lineJoin    = 'round';

        // ship body
        ctx.beginPath();
        ctx.moveTo(0, -SHIP_SIZE);
        ctx.lineTo(SHIP_SIZE * 0.55, SHIP_SIZE * 0.75);
        ctx.lineTo(0, SHIP_SIZE * 0.35);
        ctx.lineTo(-SHIP_SIZE * 0.55, SHIP_SIZE * 0.75);
        ctx.closePath();
        ctx.stroke();

        // thrust flame (flickers every other frame)
        if (ship.thrusting && punter.frame % 2 === 0) {
          var fl = SHIP_SIZE * (1.0 + Math.random() * 0.5);
          ctx.strokeStyle = COLOR_THRUST;
          ctx.beginPath();
          ctx.moveTo(-SHIP_SIZE * 0.22, SHIP_SIZE * 0.5);
          ctx.lineTo(0, SHIP_SIZE * 0.35 + fl);
          ctx.lineTo(SHIP_SIZE * 0.22, SHIP_SIZE * 0.5);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawAsteroid(ctx, ast) {
        ctx.save();
        ctx.translate(ast.x, ast.y);
        ctx.rotate(ast.spin);
        ctx.strokeStyle = COLOR_ASTEROID;
        ctx.fillStyle   = COLOR_AST_FILL;
        ctx.lineWidth   = 2 * DPR;
        ctx.lineJoin    = 'round';
        ctx.beginPath();
        ctx.moveTo(ast.pts[0].x, ast.pts[0].y);
        for (var i = 1; i < ast.pts.length; i++) ctx.lineTo(ast.pts[i].x, ast.pts[i].y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawBullet(ctx, b) {
        ctx.fillStyle = COLOR_BULLET;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3 * DPR, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawHUD(ctx, w, h) {
        var pad = 16 * DPR;

        ctx.textBaseline = 'top';
        ctx.font         = 'bold ' + 16 * DPR + 'px monospace';
        ctx.fillStyle    = COLOR_TEXT;
        ctx.textAlign    = 'left';
        ctx.fillText(score, pad, pad);

        if (highScore > 0) {
          ctx.fillStyle = COLOR_DIM;
          ctx.font      = 11 * DPR + 'px monospace';
          ctx.fillText('HI ' + highScore, pad, pad + 20 * DPR);
        }

        ctx.textAlign = 'right';
        ctx.fillText('LVL ' + level, w - pad, pad);

        // life icons centred at the top
        for (var i = 0; i < lives; i++) {
          ctx.save();
          ctx.translate(w / 2 + (i - (lives - 1) / 2) * 22 * DPR, 20 * DPR);
          ctx.rotate(-Math.PI / 2);
          ctx.strokeStyle = COLOR_SHIP;
          ctx.lineWidth   = 1.5 * DPR;
          ctx.lineJoin    = 'round';
          var s = 7 * DPR;
          ctx.beginPath();
          ctx.moveTo(0, -s);
          ctx.lineTo(s * 0.55, s * 0.75);
          ctx.lineTo(0, s * 0.35);
          ctx.lineTo(-s * 0.55, s * 0.75);
          ctx.closePath();
          ctx.stroke();
          ctx.restore();
        }

        ctx.fillStyle    = COLOR_DIM;
        ctx.font         = 12 * DPR + 'px monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('ARROWS / WASD  \u00b7  SPACE to fire', w / 2, h - 10 * DPR);

        ctx.fillStyle    = COLOR_DIM;
        ctx.font         = 12 * DPR + 'px monospace';
        ctx.textAlign    = 'right';
        ctx.textBaseline = 'bottom';
        ctx.fillText('Created by Charlie Crofts', w - pad, h - 10 * DPR);
      }

      function drawGameOver(ctx, w, h) {
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(0, 0, w, h);
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = COLOR_TEXT;
        ctx.font         = 'bold ' + 40 * DPR + 'px monospace';
        ctx.fillText('GAME OVER', w / 2, h / 2 - 32 * DPR);
        ctx.font = 20 * DPR + 'px monospace';
        ctx.fillText('Score: ' + score, w / 2, h / 2 + 10 * DPR);
        ctx.fillStyle = COLOR_DIM;
        ctx.font      = 14 * DPR + 'px monospace';
        ctx.fillText('Best: ' + highScore, w / 2, h / 2 + 36 * DPR);
        ctx.fillText('Press SPACE or tap to restart', w / 2, h / 2 + 58 * DPR);
      }
      function drawParticles(ctx) {
        for (var i = 0; i < particles.length; i++) {
          var p     = particles[i];
          var alpha = p.life / p.maxLife;
          ctx.fillStyle = 'rgba(136,153,170,' + alpha + ')';
          ctx.beginPath();
          ctx.arc(p.x, p.y, (0.5 + alpha) * 2 * DPR, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawPopups(ctx) {
        ctx.save();
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.font         = 'bold ' + 13 * DPR + 'px monospace';
        for (var i = 0; i < popups.length; i++) {
          var p         = popups[i];
          ctx.globalAlpha = p.life / p.maxLife;
          ctx.fillStyle   = COLOR_BULLET;
          ctx.fillText(p.text, p.x, p.y);
        }
        ctx.restore();
      }

      function drawLevelAnnounce(ctx, w, h) {
        var alpha;
        if (levelAnnounce > 90) {
          alpha = (120 - levelAnnounce) / 30;
        } else if (levelAnnounce > 30) {
          alpha = 1;
        } else {
          alpha = levelAnnounce / 30;
        }
        ctx.save();
        ctx.globalAlpha  = alpha;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = COLOR_TEXT;
        ctx.font         = 'bold ' + 32 * DPR + 'px monospace';
        ctx.fillText('LEVEL ' + level, w / 2, h / 2);
        ctx.restore();
      }
      // =========================================================
      // MATH HELPERS
      // =========================================================

      /** Wraps v within [0, max) */
      function wrap(v, max) {
        if (v < 0)    return v + max;
        if (v >= max) return v - max;
        return v;
      }

      /** Squared distance between two points */
      function dist2(x1, y1, x2, y2) {
        return (x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1);
      }

      /** Squares a number */
      function sqr(x) {
        return x * x;
      }

      punter.go('play');

    </script>
  </body>
</html>
