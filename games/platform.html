<!doctype html>
<html>
  <head>
    <title>Platform</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, #1a237e 0%, #4fc3f7 30%, #81d4fa 50%, #e8f5e9 85%, #66bb6a 100%);
        touch-action: none;
        -webkit-touch-callout: none;
        user-select: none;
      }

      canvas {
        display: block;
        background: linear-gradient(180deg,
          #4fc3f7 0%,
          #81d4fa 20%,
          #b3e5fc 45%,
          #e0f7fa 65%,
          #e8f5e9 85%,
          #a5d6a7 100%
        );
      }
    </style>
    <script src="../src/punter.js"></script>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script>

      // ─── HELPERS ───────────────────────────────────────────────────────

      var DPR = punter.dpr;

      /**
       * Converts logical pixels to device-scaled pixels
       * @param {number} n - logical pixel value
       * @returns {number}
       */
      function px(n) {
        return n * DPR;
      }

      /**
       * Clamps value between min and max
       * @param {number} v
       * @param {number} lo
       * @param {number} hi
       * @returns {number}
       */
      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(v, hi));
      }

      // ─── TUNING CONSTANTS ─────────────────────────────────────────────
      // adjust these to change how the game feels

      var PLAYER_H       = px(48);
      var PLAYER_SPEED   = px(5);    // ground movement speed
      var AIR_SPEED      = px(4);    // reduced control in the air
      var JUMP_FORCE     = px(13);   // initial upward velocity on jump
      var GRAVITY        = px(0.7);  // downward acceleration per frame
      var MAX_FALL       = px(12);   // terminal velocity
      var ENEMY_SPEED    = px(2);    // patrol speed
      var GEM_SIZE       = px(22);   // collectible size
      var GROUND_H       = px(20);   // thickness of ground tile
      var LEDGE_H        = px(16);   // thickness of floating ledges
      var FLAG_W         = px(30);   // goal flag dimensions
      var FLAG_H         = px(50);
      var GROUND_MARGIN  = px(24);   // gap below ground to canvas bottom

      // ─── GAME STATE ────────────────────────────────────────────────────
      // all state is reset in buildLevel() on each restart

      var player;
      var flag;
      var platforms;
      var gems;
      var enemies;
      var clouds;
      var vel;
      var score;
      var totalGems;
      var grounded;
      var won;
      var dead;

      // ─── ENGINE SETUP ──────────────────────────────────────────────────

      punter.setup({
        canvas: '#game',
        images: {
          player:  '../images/platform/player.svg',
          ground:  '../images/platform/ground.svg',
          ledge:   '../images/platform/ledge.svg',
          gem:     '../images/platform/gem.svg',
          slime:   '../images/platform/slime.svg',
          flag:    '../images/platform/flag.svg',
          bush:    '../images/platform/bush.svg',
          cloud:   '../images/platform/cloud.svg'
        },
        sounds: {
          jump: '../sounds/whoosh2.mp3',
          gem:  '../sounds/bling3.mp3',
          hit:  '../sounds/error2.mp3',
          win:  '../sounds/fanfare1.mp3'
        }
      });

      // ─── MAIN SCENE ────────────────────────────────────────────────────

      punter.scene('play', function () {
        buildLevel();

        punter.on('update', function () {
          // if game ended, wait for restart input
          if (dead || won) {
            if (punter.isKeyDown('space') || punter.pointer.clicked) {
              punter.clearInput();
              punter.go('play');
            }
            return;
          }

          handleInput();
          applyPhysics();
          checkGems();
          moveEnemies();
          moveClouds();
          checkGoal();
        });

        punter.on('draw', function () {
          var ctx = this;
          var w = punter.width;
          var h = punter.height;

          // hud: gem counter top-left with shadow
          ctx.save();
          ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
          ctx.shadowBlur = px(3);
          ctx.shadowOffsetY = px(1);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold ' + px(16) + 'px sans-serif';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'top';
          ctx.fillText('Gems: ' + score + ' / ' + totalGems, px(12), px(12));
          ctx.restore();

          // hint text at bottom
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.font = px(12) + 'px sans-serif';
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.fillText('Arrows / WASD to move \u2022 SPACE to jump \u2022 Tap to play on mobile', w / 2, h - px(8));

          // win/lose overlay
          if (won || dead) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, w, h);
            ctx.save();
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = px(6);
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold ' + px(32) + 'px sans-serif';
            ctx.fillText(won ? 'LEVEL COMPLETE!' : 'OOPS!', w / 2, h / 2 - px(20));
            ctx.font = px(16) + 'px sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.fillText('Tap or press SPACE to retry', w / 2, h / 2 + px(20));
            ctx.restore();
          }
        });
      });

      // ─── LEVEL BUILDER ─────────────────────────────────────────────────

      /**
       * Resets state and places all platforms, gems, enemies, and the goal flag
       */
      function buildLevel() {
        var w = punter.width;
        var h = punter.height;
        var groundY = h - GROUND_MARGIN - GROUND_H;
        var ledgeW = Math.floor(w * 0.2);

        // reset arrays and state
        platforms = [];
        gems = [];
        enemies = [];
        score = 0;
        totalGems = 5;
        grounded = false;
        won = false;
        dead = false;
        vel = { x: 0, y: 0 };

        // ground: three segments with a gap for danger
        addPlatform('ground-l', 'ground', 0, groundY, Math.floor(w * 0.38), GROUND_H);
        addPlatform('ground-m', 'ground', Math.floor(w * 0.43), groundY, Math.floor(w * 0.22), GROUND_H);
        addPlatform('ground-r', 'ground', Math.floor(w * 0.70), groundY, Math.floor(w * 0.30), GROUND_H);

        // floating ledges — one-way platforms you can jump through from below
        // staggered so each is reachable with a single jump from the previous
        var ledge1Y = h - px(120);
        var ledge2Y = h - px(195);
        var ledge3Y = h - px(270);
        var ledge4Y = h - px(345);
        addPlatform('ledge-1', 'ledge', Math.floor(w * 0.12), ledge1Y, ledgeW, LEDGE_H, true);
        addPlatform('ledge-2', 'ledge', Math.floor(w * 0.40), ledge2Y, ledgeW, LEDGE_H, true);
        addPlatform('ledge-3', 'ledge', Math.floor(w * 0.62), ledge3Y, ledgeW, LEDGE_H, true);
        addPlatform('ledge-4', 'ledge', Math.floor(w * 0.32), ledge4Y, ledgeW, LEDGE_H, true);

        // player starts on the left ground
        player = punter.createSprite({
          id: 'player',
          image: 'player',
          x: px(40),
          y: groundY - PLAYER_H,
          h: PLAYER_H,
          preserveAspect: true,
          boundsMode: 'rect'
        });

        // goal flag on the top ledge
        flag = punter.createSprite({
          id: 'flag',
          image: 'flag',
          x: Math.floor(w * 0.42),
          y: ledge4Y - FLAG_H,
          w: FLAG_W,
          h: FLAG_H,
          preserveAspect: true,
          boundsMode: 'rect'
        });

        // gems placed above each ledge
        addGem('gem-1', Math.floor(w * 0.19), ledge1Y - px(28));
        addGem('gem-2', Math.floor(w * 0.47), ledge2Y - px(28));
        addGem('gem-3', Math.floor(w * 0.69), ledge3Y - px(28));
        addGem('gem-4', Math.floor(w * 0.39), ledge4Y - px(28));
        addGem('gem-5', Math.floor(w * 0.55), groundY - px(30));

        // patrolling slime enemies on ledge surfaces
        addEnemy('slime-1', Math.floor(w * 0.43), ledge2Y - px(24), Math.floor(w * 0.40), Math.floor(w * 0.56));
        addEnemy('slime-2', Math.floor(w * 0.65), ledge3Y - px(24), Math.floor(w * 0.62), Math.floor(w * 0.78));

        // drifting clouds (no collision)
        clouds = [];
        clouds.push(addCloud('cloud-1', Math.floor(w * 0.1), px(30), px(80), px(40)));
        clouds.push(addCloud('cloud-2', Math.floor(w * 0.6), px(50), px(70), px(35)));
        clouds.push(addCloud('cloud-3', Math.floor(w * 0.35), px(15), px(60), px(30)));
        addDecor('bush-1', 'bush', Math.floor(w * 0.08), groundY - px(24), px(48), px(24));
        addDecor('bush-2', 'bush', Math.floor(w * 0.72), groundY - px(24), px(48), px(24));
      }

      // ─── SPRITE FACTORIES ──────────────────────────────────────────────

      /**
       * Creates a platform sprite with full-rect collision bounds
       * @param {boolean} [oneWay] - if true, player can jump through from below
       */
      function addPlatform(id, image, x, y, w, h, oneWay) {
        var s = punter.createSprite({
          id: id, image: image,
          x: x, y: y, w: w, h: h,
          preserveAspect: false,
          boundsMode: 'rect'
        });
        s.oneWay = (oneWay === true);
        platforms.push(s);
        return s;
      }

      /**
       * Creates a bouncing gem collectible
       */
      function addGem(id, x, y) {
        var s = punter.createSprite({
          id: id, image: 'gem',
          x: x, y: y,
          w: GEM_SIZE, h: GEM_SIZE,
          boundsMode: 'rect'
        });
        gems.push(s);
      }

      /**
       * Creates a patrolling enemy between minX and maxX
       */
      function addEnemy(id, x, y, minX, maxX) {
        var s = punter.createSprite({
          id: id, image: 'slime',
          x: x, y: y,
          w: px(24), h: px(24),
          boundsMode: 'rect'
        });
        s.minX = minX;
        s.maxX = maxX;
        s.dir = 1; // 1 = right, -1 = left
        enemies.push(s);
      }

      /**
       * Creates a non-collidable decoration sprite
       */
      function addDecor(id, image, x, y, w, h) {
        punter.createSprite({
          id: id, image: image,
          x: x, y: y, w: w, h: h,
          preserveAspect: true,
          collidable: false
        });
      }

      /**
       * Creates a cloud sprite that drifts using parallaxScrollX
       */
      function addCloud(id, x, y, w, h) {
        return punter.createSprite({
          id: id, image: 'cloud',
          x: x, y: y, w: w, h: h,
          preserveAspect: true,
          collidable: false
        });
      }

      /**
       * Drifts each cloud across the screen at slightly different speeds
       */
      function moveClouds() {
        for (var i = 0; i < clouds.length; i++) {
          var speed = px(0.3) + (i * px(0.15));
          clouds[i].parallaxScrollX(-speed, 2000);
        }
      }

      // ─── INPUT HANDLING ────────────────────────────────────────────────

      /**
       * Reads keyboard and touch input to set player velocity
       */
      function handleInput() {
        var left = punter.isKeyDown('left', 'a');
        var right = punter.isKeyDown('right', 'd');
        var speed = grounded ? PLAYER_SPEED : AIR_SPEED;

        // keyboard movement
        if (left && !right) {
          vel.x = -speed;
        }
        else if (right && !left) {
          vel.x = speed;
        }
        else {
          vel.x = 0;
        }

        // mobile: hold left/right half to steer, tap upper area to jump
        if (punter.isPointerDown()) {
          if (punter.pointer.x < punter.width * 0.4) {
            vel.x = -speed;
          }
          else if (punter.pointer.x > punter.width * 0.6) {
            vel.x = speed;
          }
        }

        // tapping upper portion triggers jump (one-shot)
        if (punter.pointer.clicked && grounded && punter.pointer.y < punter.height * 0.75) {
          doJump();
        }

        // keyboard jump
        if (grounded && punter.isKeyDown('space', 'up', 'w')) {
          doJump();
        }
      }

      /**
       * Launches the player upward
       */
      function doJump() {
        vel.y = -JUMP_FORCE;
        grounded = false;
        punter.playSound('jump');
      }

      // ─── PHYSICS ───────────────────────────────────────────────────────

      /**
       * Moves the player and resolves collisions with platforms
       */
      function applyPhysics() {
        var prevY = player.y;
        var i;

        // gravity pulls the player down each frame
        vel.y = Math.min(vel.y + GRAVITY, MAX_FALL);

        // -- horizontal pass (skip one-way platforms — they only block from above) --
        player.moveX(vel.x);
        player.x = clamp(player.x, 0, punter.width - player.w);

        for (i = 0; i < platforms.length; i++) {
          if (platforms[i].oneWay) continue; // one-way ledges don't block sideways
          if (player.isCollidingWith(platforms[i])) {
            if (vel.x > 0) player.x = platforms[i].x - player.w;
            else if (vel.x < 0) player.x = platforms[i].x + platforms[i].w;
          }
        }

        // -- vertical pass --
        player.moveY(vel.y);
        grounded = false;

        for (i = 0; i < platforms.length; i++) {
          if (!player.isCollidingWith(platforms[i])) continue;

          if (prevY + player.h <= platforms[i].y && vel.y >= 0) {
            // landed on top (works for both solid and one-way platforms)
            player.y = platforms[i].y - player.h;
            vel.y = 0;
            grounded = true;
          }
          else if (!platforms[i].oneWay && prevY >= platforms[i].y + platforms[i].h && vel.y < 0) {
            // hit underside of a solid platform (one-way ledges are passable from below)
            player.y = platforms[i].y + platforms[i].h;
            vel.y = 0;
          }
        }

        // fell off the world
        if (player.y > punter.height + px(20)) {
          die();
        }
      }

      // ─── COLLECTIBLES ──────────────────────────────────────────────────

      /**
       * Checks if player touches a gem; removes it and increments score
       */
      function checkGems() {
        for (var i = gems.length - 1; i >= 0; i--) {
          gems[i].bounce(px(4), 12); // gentle float animation

          if (player.isCollidingWith(gems[i])) {
            gems[i].destroy();
            gems.splice(i, 1);
            score++;
            punter.playSound('gem');
          }
        }
      }

      // ─── ENEMIES ───────────────────────────────────────────────────────

      /**
       * Moves enemies back and forth; kills player on contact
       */
      function moveEnemies() {
        for (var i = 0; i < enemies.length; i++) {
          var e = enemies[i];
          e.moveX(ENEMY_SPEED * e.dir);

          // reverse at patrol edges
          if (e.x <= e.minX) { e.x = e.minX; e.dir = 1; }
          if (e.x + e.w >= e.maxX) { e.x = e.maxX - e.w; e.dir = -1; }

          if (player.isCollidingWith(e)) {
            die();
            return;
          }
        }
      }

      // ─── GOAL ──────────────────────────────────────────────────────────

      /**
       * Checks win condition: all gems collected and player touches the flag
       */
      function checkGoal() {
        if (score === totalGems && player.isCollidingWith(flag)) {
          won = true;
          punter.playSound('win');
          punter.clearInput();
        }
      }

      /**
       * Handles player death
       */
      function die() {
        dead = true;
        punter.playSound('hit');
        punter.clearInput();
      }

      // ─── RESIZE HANDLER ────────────────────────────────────────────────
      // rebuild the level on resize so everything stays proportional

      punter.on('resize', function () {
        if (punter.sceneName === 'play') {
          punter.go('play');
        }
      });

      // start the game
      punter.go('play');

    </script>
  </body>
</html>
